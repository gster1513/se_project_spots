<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spots is a web application that allows users to find and share their favorite spots in the city.">
    <meta name="author" content="Geoffrey Sterling">
    <meta name="keywords" content="HTML,CSS,Spots, web application, city, find, share, favorite spots, photo uploads, social engagement, user profiles, reviews, ratings, web page, responsive design">
    <link rel="stylesheet" href="pages/index.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Spots</title>
</head>
<body>
<div class="page">
  <header class="header">
    <img src="./images/Logo.jpg" alt="Spot Logo" class="header__logo" />
  </header>
  <main class="content">
<section class="profile page__section">
  <img class="profile__avatar" src="./images/avatar.jpg" alt="Bessie Coleman avatar"/>
  <div class="profile__column">
  <h1 class="profile__name">Bessie Coleman</h1>
  <p class="profile__description">Civil Aviator</p>
  <button type="button" class="profile__edit-btn">
    <img src="./images/Pencil.png" alt="pencil icon" class="profile__edit-icon"/>Edit Profile
   </button>
   </div>
   <button type="button" class="profile__add-btn">
    <img src="./images/Plus.png" alt="plus icon" class="profile__add-icon"/>New Post</button>
  </section>
<section class="cards page__section">
  <ul class="cards__list">
            <li class="card">
              <img class="card__image" src="./images/1-photo-by-moritz-feldmann-from-pexels.jpg" alt="val thorens">
              <div class="card__content">
                <h2 class="card__title">Val Thorens</h2>
                <button class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img class="card__image" src="./images/2-photo-by-ceiline-from-pexels.jpg" alt="Restaurant terrace">
              <div class="card__content">
                <h2 class="card__title">Restaurant terrace</h2>
                <button class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img class="card__image" src="./images/3-photo-by-tubanur-dogan-from-pexels.jpg" alt="outdoor cafe">
              <div class="card__content">
                <h2 class="card__title">An outdoor cafe</h2>
                <button class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img class="card__image" src="./images/4-photo-by-maurice-laschet-from-pexels.jpg" alt="long bridge over forest">
              <div class="card__content">
                <h2 class="card__title">A very long bridge, over the forest...</h2>
                <button class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img class="card__image" src="./images/5-photo-by-van-anh-nguyen-from-pexels.jpg" alt="tunnel with morning light">
              <div class="card__content">
                <h2 class="card__title">Tunnel with morning light</h2>
                <button class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img class="card__image" src="./images/6-photo-by-moritz-feldmann-from-pexels.jpg" alt="mountain house">
              <div class="card__content">
                <h2 class="card__title">Mountain house</h2>
                <button class="card__like-btn"></button>
              </div>
            </li>
          </ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">2026 © Spots</p>
  </footer>
  <div class="modal modal_is-opened" id="edit-modal">
        <!-- Edit profile pop-up -->
        <div class="modal__container modal__card">
          <button
            type="button"
            class="modal__close-btn modal__close-btn_modal_form"
          ></button>
          <h2 class="modal__title">Edit Profile</h2>
          <form name="edit-profile" class="modal__form">
            <label for="profile-name-input" class="modal__label">
              Name
              <input
                id="profile-name-input"
                type="text"
                class="modal__input"
                placeholder="Type your name"
                minlength="2"
                maxlength="40"
                required
              />
              <span id="profile-name-input-error" class="modal__error"></span>
            </label>
            <label for="profile-description-input" class="modal__label">
              Description
              <input
                id="profile-description-input"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
                minlength="2"
                maxlength="200"
                required
              />
              <span id="profile-description-input-error" class="modal__error"></span>
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="add-card-modal">
        <!-- Add profile pop-up -->
        <div class="modal__container modal__card">
          <button
            type="button"
            class="modal__close-btn modal__close-btn_modal_form"
          ></button>
          <h2 class="modal__title">New Post</h2>
          <form name="add-card" class="modal__form">
            <label for="add-card-link-input" class="modal__label">
              Image link
              <input
                id="add-card-link-input"
                type="url"
                class="modal__input"
                placeholder="Paste a link to the picture"
                required
              />
              <span id="add-card-link-input-error" class="modal__error"></span>
            </label>
            <label for="add-card-name-input" class="modal__label">
              Caption
              <input
                id="add-card-name-input"
                type="text"
                class="modal__input"
                placeholder="Type your caption"
                minlength="2"
                maxlength="30"
                required
              />
              <span id="add-card-name-input-error" class="modal__error"></span>
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="preview-modal">
        <div class="modal__container modal__container_type_preview">
          <button class="modal__close-btn_preview modal__close-btn"></button>
           <img
            class="modal__image"
            src="https://practicum-content.s3.us-west-1.amazonaws.com/software-engineer/spots/1-photo-by-moritz-feldmann-from-pexels.jpg"
            alt=""
          />
          <br />
          <p class="modal__caption"></p>
        </div>
      </div>
    </div>
    <script defer src="./scripts/validation.js"></script>
    <script defer src="./scripts/index.js"></script>
</div>
</body>
</html>
